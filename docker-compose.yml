services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "4001:4000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 4000
      BUILD_MODE: production
      DB_URL: mongodb://mongo:27017/jobgo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: 30122005
      ELASTICSEARCH_URL: http://elasticsearch:9200
      EMBEDDING_API_URL: http://embedding-api:8000
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080,http://localhost:4001,http://127.0.0.1:4001,http://nhutrunghai.id.vn,http://www.nhutrunghai.id.vn,https://nhutrunghai.id.vn,https://www.nhutrunghai.id.vn
      FRONTEND_URL: https://nhutrunghai.id.vn
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      embedding-api:
        condition: service_started
    restart: unless-stopped

  embedding-api:
    build: ./embedding-api
    ports:
      - "8001:8000"
    environment:
      HF_HOME: /app/.cache/huggingface
      HF_MODULES_CACHE: /app/.cache/hf_modules
      TORCH_HOME: /app/.cache/torch
      HF_HUB_OFFLINE: 0
      TRANSFORMERS_OFFLINE: 0
      LOCAL_FILES_ONLY: 0
    volumes:
      - embedding_models:/app/.models
      - embedding_cache:/app/.cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mongo:
    image: mongo:8.2
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass 30122005
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "30122005", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      cluster.name: jobgo-cluster
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9201:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    ports:
      - "5602:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  es_data:
  embedding_models:
  embedding_cache:
