openapi: 3.0.3
info:
  title: "JobGo API"
  version: "0.2.0"
  description: "Tai lieu API backend hien tai, cap nhat theo source code."
servers:
  - url: "http://localhost:4000/api/v1"
tags:
  - name: "Auth"
  - name: "User"
  - name: "Jobs"
  - name: "Company"
  - name: "Applications"
paths:
  /auth/register:
    post:
      tags: ["Auth"]
      summary: "Dang ky tai khoan candidate"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: "Dang ky thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/login:
    post:
      tags: ["Auth"]
      summary: "Dang nhap"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "201":
          description: "Dang nhap thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/oauth/google:
    get:
      tags: ["Auth"]
      summary: "Dang nhap bang Google"
      parameters:
        - name: "code"
          in: "query"
          required: true
          schema:
            type: "string"
      responses:
        "302":
          description: "Redirect ve front-end"
  /auth/logout:
    post:
      tags: ["Auth"]
      summary: "Dang xuat"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"
  /auth/refresh-token:
    post:
      tags: ["Auth"]
      summary: "Lam moi token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "201":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/verify-email:
    post:
      tags: ["Auth"]
      summary: "Xac minh email"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/forgot-password:
    post:
      tags: ["Auth"]
      summary: "Gui email quen mat khau"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"
  /auth/reset-password:
    post:
      tags: ["Auth"]
      summary: "Dat lai mat khau"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"

  /user/me:
    get:
      tags: ["User"]
      summary: "Lay profile cua chinh minh"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
  /user/profile/{id}:
    get:
      tags: ["User"]
      summary: "Lay profile public theo username"
      parameters:
        - $ref: "#/components/parameters/UserNameParam"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
  /user/profile:
    patch:
      tags: ["User"]
      summary: "Cap nhat profile"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"
  /user/setting:
    get:
      tags: ["User"]
      summary: "Lay setting cua user"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
    patch:
      tags: ["User"]
      summary: "Cap nhat setting cua user"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserSettingRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"
  /user/setting/resend-mail:
    post:
      tags: ["User"]
      summary: "Gui lai email xac minh"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"
  /user/setting/change-password:
    post:
      tags: ["User"]
      summary: "Gui OTP doi mat khau"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"
  /user/setting/new-password:
    post:
      tags: ["User"]
      summary: "Dat mat khau moi bang OTP"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPasswordRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"

  /jobs/me/applied:
    get:
      tags: ["Jobs"]
      summary: "Lay danh sach job da ung tuyen"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - name: "status"
          in: "query"
          schema:
            $ref: "#/components/schemas/JobApplicationStatus"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
  /jobs/{jobId}:
    get:
      tags: ["Jobs"]
      summary: "Lay chi tiet job public"
      description: "Public endpoint. Neu gui access token hop le thi response co them my_application."
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicJobDetailResponse"
  /jobs/{jobId}/apply:
    post:
      tags: ["Jobs"]
      summary: "Ung tuyen vao job"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyJobRequest"
      responses:
        "201":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
  /jobs/{jobId}/withdraw:
    patch:
      tags: ["Jobs"]
      summary: "Rut ho so da ung tuyen"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"

  /company:
    post:
      tags: ["Company"]
      summary: "Tao company profile"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "201":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
    patch:
      tags: ["Company"]
      summary: "Cap nhat company profile"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"
  /company/me:
    get:
      tags: ["Company"]
      summary: "Lay company profile cua chinh minh"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
  /company/jobs:
    post:
      tags: ["Company"]
      summary: "Tao job"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
    get:
      tags: ["Company"]
      summary: "Lay danh sach jobs cua employer"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - name: "status"
          in: "query"
          schema:
            $ref: "#/components/schemas/JobStatus"
        - name: "keyword"
          in: "query"
          schema:
            type: "string"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
  /company/jobs/{jobId}:
    get:
      tags: ["Company"]
      summary: "Lay chi tiet mot job cua employer"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
    patch:
      tags: ["Company"]
      summary: "Cap nhat job"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
  /company/jobs/{jobId}/status:
    patch:
      tags: ["Company"]
      summary: "Cap nhat trang thai job"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobStatusRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
  /company/jobs/{jobId}/applications:
    get:
      tags: ["Applications"]
      summary: "Lay danh sach applications cua mot job"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdParam"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - name: "status"
          in: "query"
          schema:
            $ref: "#/components/schemas/JobApplicationStatus"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
  /company/applications/{applicationId}:
    get:
      tags: ["Applications"]
      summary: "Lay chi tiet application"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ApplicationIdParam"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
  /company/applications/{applicationId}/status:
    patch:
      tags: ["Applications"]
      summary: "Cap nhat trang thai application"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ApplicationIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationStatusRequest"
      responses:
        "200":
          description: "Thanh cong"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"

components:
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
  parameters:
    JobIdParam:
      name: "jobId"
      in: "path"
      required: true
      schema:
        type: "string"
        pattern: "^[a-fA-F0-9]{24}$"
    ApplicationIdParam:
      name: "applicationId"
      in: "path"
      required: true
      schema:
        type: "string"
        pattern: "^[a-fA-F0-9]{24}$"
    UserNameParam:
      name: "id"
      in: "path"
      required: true
      schema:
        type: "string"
    PageQuery:
      name: "page"
      in: "query"
      schema:
        type: "integer"
        minimum: 1
        default: 1
    LimitQuery:
      name: "limit"
      in: "query"
      schema:
        type: "integer"
        minimum: 1
        maximum: 100
        default: 10
  schemas:
    JobStatus:
      type: "string"
      enum: ["draft", "open", "paused", "closed", "expired"]
    JobType:
      type: "string"
      enum: ["full-time", "part-time", "internship", "contract", "remote"]
    JobLevel:
      type: "string"
      enum: ["intern", "fresher", "junior", "middle", "senior", "lead", "manager"]
    JobApplicationStatus:
      type: "string"
      enum: ["submitted", "reviewing", "shortlisted", "interviewing", "rejected", "hired", "withdrawn"]
    RegisterRequest:
      type: "object"
      required: ["fullName", "email", "password", "confirmPassword"]
      properties:
        fullName:
          type: "string"
        email:
          type: "string"
        password:
          type: "string"
        confirmPassword:
          type: "string"
    LoginRequest:
      type: "object"
      required: ["email", "password"]
      properties:
        email:
          type: "string"
        password:
          type: "string"
    RefreshRequest:
      type: "object"
      required: ["refresh_token"]
      properties:
        refresh_token:
          type: "string"
    VerifyEmailRequest:
      type: "object"
      required: ["email_verify_token"]
      properties:
        email_verify_token:
          type: "string"
    ForgotPasswordRequest:
      type: "object"
      required: ["email"]
      properties:
        email:
          type: "string"
    ResetPasswordRequest:
      type: "object"
      required: ["password", "confirmPassword", "forgot_password_token"]
      properties:
        password:
          type: "string"
        confirmPassword:
          type: "string"
        forgot_password_token:
          type: "string"
    LogoutRequest:
      type: "object"
      required: ["refresh_token"]
      properties:
        refresh_token:
          type: "string"
    NewPasswordRequest:
      type: "object"
      required: ["newPassword", "confirmNewPassword", "OtpCode"]
      properties:
        newPassword:
          type: "string"
        confirmNewPassword:
          type: "string"
        OtpCode:
          type: "string"
    CreateCompanyRequest:
      type: "object"
      required: ["company_name", "address"]
      properties:
        company_name:
          type: "string"
        logo:
          type: "string"
        website:
          type: "string"
        address:
          type: "string"
        description:
          type: "string"
    UpdateCompanyRequest:
      type: "object"
      properties:
        company_name:
          type: "string"
        logo:
          type: "string"
        website:
          type: "string"
        address:
          type: "string"
        description:
          type: "string"
    Salary:
      type: "object"
      properties:
        min:
          type: "number"
          nullable: true
        max:
          type: "number"
          nullable: true
        currency:
          type: "string"
          enum: ["VND", "USD"]
        is_negotiable:
          type: "boolean"
    CreateJobRequest:
      type: "object"
      required:
        [
          "title",
          "description",
          "requirements",
          "benefits",
          "salary",
          "location",
          "job_type",
          "level",
          "category",
          "skills",
          "quantity",
          "expired_at"
        ]
      properties:
        title:
          type: "string"
        description:
          type: "string"
        requirements:
          type: "string"
        benefits:
          type: "string"
        salary:
          $ref: "#/components/schemas/Salary"
        location:
          type: "string"
        job_type:
          $ref: "#/components/schemas/JobType"
        level:
          $ref: "#/components/schemas/JobLevel"
        status:
          type: "string"
          enum: ["draft", "open"]
        category:
          type: "array"
          items:
            type: "string"
        skills:
          type: "array"
          items:
            type: "string"
        quantity:
          type: "integer"
        expired_at:
          type: "string"
          format: "date-time"
    UpdateJobRequest:
      type: "object"
      properties:
        title:
          type: "string"
        description:
          type: "string"
        requirements:
          type: "string"
        benefits:
          type: "string"
        salary:
          $ref: "#/components/schemas/Salary"
        location:
          type: "string"
        job_type:
          $ref: "#/components/schemas/JobType"
        level:
          $ref: "#/components/schemas/JobLevel"
        category:
          type: "array"
          items:
            type: "string"
        skills:
          type: "array"
          items:
            type: "string"
        quantity:
          type: "integer"
        expired_at:
          type: "string"
          format: "date-time"
    UpdateJobStatusRequest:
      type: "object"
      required: ["status"]
      properties:
        status:
          type: "string"
          enum: ["draft", "open", "paused", "closed"]
    UpdateProfileRequest:
      type: "object"
      properties:
        fullName:
          type: "string"
        bio:
          type: "string"
        address:
          type: "string"
        skills:
          type: "array"
          items:
            type: "string"
    UpdateUserSettingRequest:
      type: "object"
      properties:
        phone:
          type: "string"
    ApplyJobRequest:
      type: "object"
      required: ["cv_id"]
      properties:
        cv_id:
          type: "string"
        cover_letter:
          type: "string"
    UpdateApplicationStatusRequest:
      type: "object"
      required: ["status"]
      properties:
        status:
          type: "string"
          enum: ["reviewing", "shortlisted", "interviewing", "rejected", "hired"]
    GenericSuccess:
      type: "object"
      properties:
        status:
          type: "string"
          example: "success"
        message:
          type: "string"
          nullable: true
        data:
          type: "object"
          additionalProperties: true
    BasicResponse:
      type: "object"
      properties:
        status:
          type: "string"
          example: "success"
        message:
          type: "string"
    AuthResponse:
      type: "object"
      properties:
        status:
          type: "string"
        message:
          type: "string"
        data:
          type: "object"
          properties:
            id:
              type: "string"
            AccessToken:
              type: "string"
            RefreshToken:
              type: "string"
    PublicJobDetailResponse:
      type: "object"
      properties:
        status:
          type: "string"
        data:
          type: "object"
          properties:
            job:
              type: "object"
              additionalProperties: true
            company:
              type: "object"
              additionalProperties: true
            my_application:
              nullable: true
              type: "object"
              properties:
                _id:
                  type: "string"
                status:
                  $ref: "#/components/schemas/JobApplicationStatus"
                applied_at:
                  type: "string"
                  format: "date-time"
                updated_at:
                  type: "string"
                  format: "date-time"
    ErrorResponse:
      type: "object"
      properties:
        status:
          type: "string"
        message:
          type: "string"
    ServerErrorResponse:
      type: "object"
      properties:
        status:
          type: "string"
        message:
          type: "string"
        stack:
          type: "string"
    ValidationError:
      type: "object"
      properties:
        status:
          type: "string"
        message:
          type: "string"
        error:
          type: "array"
          items:
            type: "object"
            properties:
              path:
                type: "string"
              location:
                type: "string"
              message:
                type: "string"
    RateLimitResponse:
      type: "object"
      properties:
        status:
          type: "integer"
        message:
          type: "string"
        retryAfter:
          type: "integer"
